{% extends "base.html" %}

{% block title %}Login - ResearchGPT{% endblock %}
{% block page_title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="glass-card p-4">
            <h3 class="text-white mb-2">Welcome back</h3>
            <p class="text-muted small mb-4">Sign in to access your private research library.</p>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small">Email</label>
                    <input type="email" name="email" class="form-control bg-dark border-secondary text-white" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Password</label>
                    <input type="password" name="password" class="form-control bg-dark border-secondary text-white" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <p class="text-muted small mt-3 mb-0">
                New here? <a href="{{ url_for('register') }}" class="text-info">Create an account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
